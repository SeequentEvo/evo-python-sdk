name: Run notebook tests

permissions:
  contents: read

on:
  push:
    branches:
      - main
  workflow_call:

jobs:
  run-notebook-tests:
    name: Notebook tests
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/install-uv
        with:
          PYTHON_VERSION: ${{ matrix.python-version }}

      - name: Run notebook tests
        env:
          EVO_CLIENT_ID: ${{ secrets.EVO_CLIENT_ID }}
          EVO_USERNAME: ${{ secrets.EVO_USERNAME }}
          EVO_PASSWORD: ${{ secrets.EVO_PASSWORD }}
          EVO_ORG_ID: ${{ secrets.EVO_ORG_ID }}
          EVO_HUB_URL: ${{ secrets.EVO_HUB_URL }}
          EVO_WORKSPACE_ID: ${{ secrets.EVO_WORKSPACE_ID }}
        run: >
          uv run
          --directory code-samples
          --group test
          pytest tests/ -v
